<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#2563eb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="CRM Pro">
  <title>CRM Pro - إدارة العملاء</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      font-family: 'Cairo', sans-serif; 
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #2563eb 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      border-radius: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 56px;
      margin: 0 auto 30px;
      border: 2px solid rgba(255,255,255,0.2);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3), 0 0 100px rgba(37,99,235,0.2);
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    h1 {
      color: white;
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      margin-bottom: 40px;
      font-weight: 400;
    }

    .features {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }

    .feature {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }

    .feature:hover {
      background: rgba(255,255,255,0.12);
      transform: translateX(-5px);
    }

    .feature-icon {
      font-size: 24px;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
    }

    .feature-text {
      text-align: right;
    }

    .feature-title {
      color: white;
      font-size: 14px;
      font-weight: 700;
    }

    .feature-desc {
      color: rgba(255,255,255,0.6);
      font-size: 12px;
    }

    .btn-open {
      background: linear-gradient(135deg, #ffffff 0%, #f0f0f0 100%);
      color: #1e3a8a;
      border: none;
      padding: 18px 40px;
      border-radius: 50px;
      font-size: 18px;
      font-weight: 700;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      width: 100%;
      margin-bottom: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .btn-open:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 50px rgba(0,0,0,0.4);
    }

    .btn-open:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-install {
      background: transparent;
      color: rgba(255,255,255,0.8);
      border: 2px solid rgba(255,255,255,0.3);
      padding: 14px 30px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      width: 100%;
      transition: all 0.3s ease;
      display: none;
    }

    .btn-install.show {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-install:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.5);
    }

    .footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.4);
      font-size: 12px;
    }

    .particles {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: hidden;
      z-index: -1;
    }

    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      animation: particle-float 15s infinite;
    }

    @keyframes particle-float {
      0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
    }

    .offline-msg {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #ef4444;
      color: white;
      text-align: center;
      padding: 10px;
      font-size: 13px;
      z-index: 300;
      display: none;
      font-weight: 600;
    }

    .offline-msg.show { display: block; }
  </style>
</head>
<body>

  <div class="offline-msg" id="offlineMsg">⚠️ لا يوجد اتصال بالإنترنت</div>

  <div class="particles" id="particles"></div>

  <div class="container">
    <div class="logo">📊</div>
    <h1>CRM Pro</h1>
    <p class="subtitle">نظام إدارة العملاء الذكي</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">⚡</div>
        <div class="feature-text">
          <div class="feature-title">سريع وخفيف</div>
          <div class="feature-desc">يعمل على أي جهاز بدون تثبيت</div>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔒</div>
        <div class="feature-text">
          <div class="feature-title">آمن 100%</div>
          <div class="feature-desc">بياناتك محمية على خوادم Google</div>
        </div>
      </div>
      <div class="feature">
        <div class="feature-icon">📱</div>
        <div class="feature-text">
          <div class="feature-title">يعمل على الموبايل</div>
          <div class="feature-desc">تجربة تطبيق حقيقية</div>
        </div>
      </div>
    </div>

    <button class="btn-open" onclick="openCRM()">
      🚀 فتح التطبيق
    </button>

    <button class="btn-install" id="installBtn" onclick="installApp()">
      📲 ثبت على الشاشة الرئيسية
    </button>

    <p class="footer">CRM Pro © 2025</p>
  </div>

  <script>
    const CRM_URL = "https://script.google.com/macros/s/AKfycbwUufi-JE2ZYbaNVT3kXJkTG-bpWHBAGpSGUNJatqo1V6mE_v2BJjqu8relbAFYc43OzA/exec";

    // فتح CRM
    function openCRM() {
      window.open(CRM_URL, '_blank');
    }

    // إنشاء particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.animationDelay = Math.random() * 15 + 's';
      p.style.animationDuration = (10 + Math.random() * 10) + 's';
      particlesContainer.appendChild(p);
    }

    // Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js')
        .then(reg => console.log('SW registered'))
        .catch(err => console.log('SW error:', err));
    }

    // Install Prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').classList.add('show');
    });

    function installApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            document.getElementById('installBtn').classList.remove('show');
          }
          deferredPrompt = null;
        });
      }
    }

    // Offline detection
    window.addEventListener('online', () => document.getElementById('offlineMsg').classList.remove('show'));
    window.addEventListener('offline', () => document.getElementById('offlineMsg').classList.add('show'));
  </script>

</body>
</html>
